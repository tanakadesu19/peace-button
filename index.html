<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title> 平和ボタン</title>

    <meta
        name="description"
        content="世界中のみんなで平和ボタンを押そう。一人ひとりの一押しが世界を少し平和にする。">

    <meta
        name="theme-color"
        content="#4CAF50">

    <meta property="og:title" content="平和ボタン">

    <meta property="og:description"
    content="世界中のみんなで平和ボタンを押そう。">

    <meta property="og:type"
    content="website">

    <meta
    property="og:image"
    content="https://あなたのRenderURL/favicon_4.png">


    <link rel="icon" type="image/png" href="favicon_4.png">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="language-switch">
        <button id="languageButton" type="button">
        English
        </button>
    </div>

    <div id="loadingScreen">
        <div class="loadingBird">
            <img src="favicon_4.png" alt="平和ボタン ロゴ">
        </div>

        <p id="loadingText">
            平和ボタンを準備しています…
        </p>
    </div>

    <h1 class="title">
        <img src="favicon_4.png" alt="ロゴ">
        <span id="pageTitle">平和ボタン</span>
    </h1>
    <button id="peaceButton">
        平和
    </button>

    <p id="peaceMessage" aria-live="polite"></p>

    <div class="info">

        <p id="myCountLabel">
            あなたが押した回数
        </p>

        <h2 id="myCount">
            0回
        </h2>

        <p id="globalCountLabel">
            世界のみんなが押した回数
        </p>

        <h2 id="globalCount">
            0回
        </h2>

        <p id="todayCountLabel">
            今日押された回数
        </p>

        <h2 id="todayCount">
            0回
        </h2>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>

</body>

</html>
